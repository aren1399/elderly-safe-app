name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool \
            libltdl-dev libffi-dev libssl-dev \
            cmake python3-pip python3-venv \
            libncurses5 libncurses-dev build-essential \
            zlib1g-dev libgles2-mesa-dev

      - name: Install Buildozer & pinned Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "Cython<3.0" virtualenv buildozer

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-v5-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v4-${{ runner.os }}-
            buildozer-v3-${{ runner.os }}-

      - name: Pre-download NDK and fix GL headers
        run: |
          NDK_DIR="$HOME/.buildozer/android/platform/android-ndk-r28c"
          if [ ! -f "$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/clang" ]; then
            echo "Downloading NDK r28c..."
            wget -q https://dl.google.com/android/repository/android-ndk-r28c-linux.zip
            unzip -q android-ndk-r28c-linux.zip
            mkdir -p "$(dirname "$NDK_DIR")"
            mv android-ndk-r28c "$NDK_DIR"
          fi
          # Create GL/gl.h wrapper that redirects to GLES
          GL_DIR="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include/GL"
          mkdir -p "$GL_DIR"
          cat > "$GL_DIR/gl.h" << 'HEADEREOF'
          #ifndef _NDK_GL_WRAPPER_H
          #define _NDK_GL_WRAPPER_H
          #define GL_GLEXT_PROTOTYPES
          #include <GLES3/gl3.h>
          #endif
          HEADEREOF
          cat > "$GL_DIR/glext.h" << 'HEADEREOF'
          #ifndef _NDK_GLEXT_WRAPPER_H
          #define _NDK_GLEXT_WRAPPER_H
          #include <GLES2/gl2ext.h>
          #endif
          HEADEREOF
          echo "GL wrapper header created at $GL_DIR/gl.h"
          cat "$GL_DIR/gl.h"
          # Create stub libGL.so -> libGLESv2.so for linker
          for ABI in aarch64-linux-android arm-linux-androideabi; do
            for API in 24 33; do
              LIB_DIR="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/$ABI/$API"
              if [ -d "$LIB_DIR" ] && [ -f "$LIB_DIR/libGLESv2.so" ]; then
                ln -sf libGLESv2.so "$LIB_DIR/libGL.so"
                echo "Created libGL.so stub in $LIB_DIR"
              fi
            done
          done

      - name: Build APK
        id: build
        run: |
          set -o pipefail
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          yes | buildozer android debug 2>&1 | tee build-output.log | tail -200

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build-output.log
            .buildozer/android/platform/python-for-android/build.log
          retention-days: 7

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elderly-safe-apk
          path: |
            bin/*.apk
            bin/*.aab
          retention-days: 30

      - name: Check result
        if: always()
        run: |
          if ls bin/*.apk 2>/dev/null; then
            echo "=== APK BUILD SUCCESS ==="
            ls -lh bin/
          else
            echo "=== APK NOT FOUND - checking errors ==="
            grep -i "error\|failed" build-output.log 2>/dev/null | tail -30 || true
          fi
