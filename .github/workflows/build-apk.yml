name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool \
            libltdl-dev libffi-dev libssl-dev \
            cmake python3-pip python3-venv \
            libncurses5 libncurses-dev build-essential \
            zlib1g-dev libgles2-mesa-dev libgl1-mesa-dev

      - name: Install Buildozer & pinned Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "Cython<3.0" virtualenv buildozer

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/licenses/android-sdk-license

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-v4-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v3-${{ runner.os }}-

      - name: Build APK
        id: build
        run: |
          set -o pipefail
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export KIVY_GL_BACKEND=sdl2
          yes | buildozer android debug 2>&1 | tee build-output.log | tail -200

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build-output.log
            .buildozer/android/platform/python-for-android/build.log
          retention-days: 7

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elderly-safe-apk
          path: |
            bin/*.apk
            bin/*.aab
          retention-days: 30

      - name: Check result
        if: always()
        run: |
          echo "=== Build directory contents ==="
          ls -laR bin/ 2>/dev/null || echo "No bin/ directory"
          echo ""
          echo "=== .buildozer contents ==="
          ls -la .buildozer/ 2>/dev/null || echo "No .buildozer/"
          echo ""
          if ls bin/*.apk 2>/dev/null; then
            echo "=== APK BUILD SUCCESS ==="
            ls -lh bin/
          else
            echo "=== APK NOT FOUND ==="
            echo "Checking build log for errors..."
            grep -i "error\|failed\|exception\|traceback" build-output.log 2>/dev/null | tail -50 || true
          fi
