name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool \
            libltdl-dev libffi-dev libssl-dev \
            cmake python3-pip python3-venv \
            libncurses5 libncurses-dev build-essential \
            zlib1g-dev libgles2-mesa-dev

      - name: Install Buildozer & pinned Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "Cython<3.0" virtualenv buildozer

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/licenses/android-sdk-license

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-v2-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v2-${{ runner.os }}-

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug 2>&1 | tail -100

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: elderly-safe-apk
          path: bin/*.apk
          retention-days: 30

      - name: Show build result
        if: always()
        run: |
          if ls bin/*.apk 2>/dev/null; then
            echo "APK BUILD SUCCESS"
            ls -lh bin/
          else
            echo "APK BUILD FAILED - checking logs"
            cat .buildozer/android/platform/python-for-android/build.log 2>/dev/null | tail -100 || true
            ls -la .buildozer/ 2>/dev/null || true
          fi
